name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: novatra-test
  SERVICE_NAME: coupang-price-manager
  REGION: asia-northeast3

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Google Auth
      uses: google-github-actions/auth@v2
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Deploy to Cloud Run
      run: |
        gcloud run deploy ${{ env.SERVICE_NAME }} \
          --source . \
          --region ${{ env.REGION }} \
          --allow-unauthenticated \
          --project ${{ env.PROJECT_ID }} \
          --vpc-connector coupang-connector \
          --vpc-egress all-traffic \
          --no-cpu-throttling \
          --min-instances=1 \
          --timeout 300 \
          --set-env-vars "SECRET_KEY=4e09594e650104afa200080384f81ebb216500f239d911e2fbb8050b04f6e2e0"

    - name: Post-deploy - Trigger scheduled check
      run: |
        echo "Waiting 10s for Cloud Run to stabilize..."
        sleep 10
        SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} --region ${{ env.REGION }} --project ${{ env.PROJECT_ID }} --format 'value(status.url)')
        echo "Service URL: $SERVICE_URL"
        
        # 3회 재시도
        MAX_RETRIES=3
        RETRY=0
        SUCCESS=false
        
        while [ $RETRY -lt $MAX_RETRIES ]; do
          RETRY=$((RETRY + 1))
          echo "Attempt $RETRY/$MAX_RETRIES..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$SERVICE_URL/api/scheduled-check" --max-time 120)
          echo "Response: $RESPONSE"
          
          if [ "$RESPONSE" = "200" ]; then
            echo "Scheduled check completed successfully"
            SUCCESS=true
            break
          fi
          
          if [ $RETRY -lt $MAX_RETRIES ]; then
            echo "Retrying in 15s..."
            sleep 15
          fi
        done
        
        if [ "$SUCCESS" = "false" ]; then
          echo "WARNING: All $MAX_RETRIES attempts failed (server startup auto-check will retry)"
        fi
