name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: novatra-test
  SERVICE_NAME: coupang-price-manager
  REGION: asia-northeast3

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Google Auth
      uses: google-github-actions/auth@v2
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Deploy to Cloud Run
      run: |
        gcloud run deploy ${{ env.SERVICE_NAME }} \
          --source . \
          --region ${{ env.REGION }} \
          --allow-unauthenticated \
          --project ${{ env.PROJECT_ID }} \
          --vpc-connector coupang-connector \
          --vpc-egress all-traffic \
          --timeout 300

    - name: Post-deploy - Trigger scheduled check
      run: |
        echo "Waiting 10s for Cloud Run to stabilize..."
        sleep 10
        SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} --region ${{ env.REGION }} --project ${{ env.PROJECT_ID }} --format 'value(status.url)')
        echo "Service URL: $SERVICE_URL"
        RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$SERVICE_URL/api/scheduled-check" --max-time 120)
        echo "Scheduled check response: $RESPONSE"
        if [ "$RESPONSE" = "200" ]; then
          echo "Scheduled check completed successfully"
        else
          echo "Warning: Scheduled check returned $RESPONSE (non-fatal)"
        fi
